<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f8fafc" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>OS Motores V5</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/components.css" />
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
</head>
<body>
  <div id="app" class="app-shell">
    <header id="appHeader" class="app-header hidden">
      <div>
        <div class="hello" id="headerGreeting">Olá</div>
        <div class="subline" id="headerContext">Carregando...</div>
      </div>
      <div class="header-actions">
        <button id="btnSearch" class="icon-btn" title="Buscar OS" type="button">⌕</button>
        <button id="btnQrTop" class="icon-btn primary qr-text-btn" title="Ler QR Code" type="button">QR</button>
      </div>
    </header>

    <main id="screen" class="screen"></main>

    <nav id="bottomNav" class="bottom-nav hidden">
      <button data-nav="history" class="nav-btn"><span>◷</span><small>Histórico</small></button>
      <button data-nav="home" class="nav-btn active"><span>⌂</span><small>Início</small></button>
      <button data-nav="settings" class="nav-btn"><span>⚙</span><small>Config.</small></button>
    </nav>
  </div>

  <div id="modalRoot"></div>
  <div id="toast" class="toast"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
