<script>
window.addEventListener("error", function(e){
  console.error("Projeto Natan boot error:", e.error || e.message);
  const root = document.getElementById("screen") || document.querySelector(".screen") || document.body;
  if(root && !root.dataset.errorShown){
    root.dataset.errorShown = "1";
    root.innerHTML = '<div style="max-width:460px;margin:18vh auto;padding:24px;border-radius:24px;background:#fff;color:#0f172a;font-family:Inter,Arial,sans-serif;box-shadow:0 18px 60px rgba(15,23,42,.12)"><h2 style="margin:0 0 8px">Erro ao iniciar</h2><p style="color:#64748b;line-height:1.4">Erro detectado: <b>'+ String(e.message || "erro desconhecido") +'</b></p><p style="color:#64748b;line-height:1.4">Use Ctrl+F5. Se persistir, envie o texto acima.</p><button onclick="localStorage.clear();location.reload()" style="width:100%;height:46px;border:0;border-radius:14px;background:#2563eb;color:white;font-weight:800">Limpar sessão e recarregar</button></div>';
  }
});
window.addEventListener("unhandledrejection", function(e){
  console.error("Projeto Natan promise error:", e.reason);
});
</script>


<script>
// V3.13.2 boot monitor
window.addEventListener("error", function(e){
  console.error("Projeto Natan erro:", e.message, e.error);
});

  console.error("Projeto Natan promise:", e.reason);
